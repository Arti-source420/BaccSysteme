<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::content}, 'clients')}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div class="page-header-left">
      <div class="breadcrumb">
        <a th:href="@{/}">Accueil</a>
        <span class="breadcrumb-sep">›</span>
        <a th:href="@{/clients}">Clients</a>
        <span class="breadcrumb-sep">›</span>
        <span th:text="${pageTitle}">Formulaire</span>
      </div>
      <h1 th:text="${pageTitle}">Client</h1>
      <p th:if="${client.id == null}">Remplissez les informations du nouveau client</p>
      <p th:unless="${client.id == null}">Modifiez les informations du client</p>
    </div>
  </div>

  <div class="card" style="max-width: 700px;">
    <div class="card-header">
      <div class="card-header-icon"></div>
      <h2 th:text="${pageTitle}">Client</h2>
    </div>
    <div class="card-body">

      <form th:action="${client.id == null} ? @{/clients/nouveau} : @{/clients/{id}/modifier(id=${client.id})}"
            th:object="${client}"
            method="post">

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="nom">
              Nom <span class="required">*</span>
            </label>
            <input type="text" id="nom" th:field="*{nom}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('nom')} ? ' is-invalid' : ''"
                   placeholder="Nom complet du client"/>
            <span th:if="${#fields.hasErrors('nom')}"
                  th:errors="*{nom}" class="invalid-feedback"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="contact">
              Contact <span class="required">*</span>
            </label>
            <input type="text" id="contact" th:field="*{contact}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('contact')} ? ' is-invalid' : ''"
                   placeholder="Téléphone, email ou adresse"/>
            <span th:if="${#fields.hasErrors('contact')}"
                  th:errors="*{contact}" class="invalid-feedback"></span>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <span th:if="${client.id == null}"> Créer le client</span>
            <span th:unless="${client.id == null}"> Enregistrer les modifications</span>
          </button>
          <a th:href="@{/clients}" class="btn btn-secondary">Annuler</a>
        </div>

      </form>
    </div>
  </div>

</th:block>
</body>
</html>
