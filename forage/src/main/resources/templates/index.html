<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Tableau de bord', ~{::content}, 'home')}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div class="page-header-left">
   
      <p>Vue d'ensemble de votre activité de forage</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
     
      <div class="stat-value" th:text="${totalClients}">0</div>
      <div class="stat-label">Clients</div>
    </div>
    <div class="stat-card">
      
      <div class="stat-value" th:text="${totalDemandes}">0</div>
      <div class="stat-label">Demandes</div>
    </div>
    <div class="stat-card">
     
      <!-- <div class="stat-value">—</div>
      <div class="stat-label">Forages actifs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">—</div>
      <div class="stat-label">Terminés</div>
    </div>
  </div> -->

  <div class="dashboard-grid">

    <!-- Recent Demandes -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon"></div>
        <h2>Demandes récentes</h2>
      </div>
      <div class="card-body" style="padding:0;">
        <div th:if="${#lists.isEmpty(recentDemandes)}" class="empty-state" style="padding:40px 20px;">
          <div class="empty-state-icon"></div>
          <p>Aucune demande enregistrée</p>
        </div>
        <table th:if="${!#lists.isEmpty(recentDemandes)}">
          <thead>
            <tr>
              <th>Lieu</th>
              <th>Client</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="d : ${recentDemandes}">
              <td th:text="${d.lieu}">—</td>
              <td class="td-muted" th:text="${d.client.nom}">—</td>
              <td class="td-muted" th:text="${#temporals.format(d.date,'dd/MM/yyyy')}">—</td>
              <td>
                <a th:href="@{/demandes/{id}/detail(id=${d.id})}" class="btn btn-sm btn-secondary">
                  Voir
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon"></div>
        <h2>Actions rapides</h2>
      </div>
      <div class="card-body" style="display:flex; flex-direction:column; gap:12px;">
        <a th:href="@{/clients/nouveau}" class="btn btn-primary" style="justify-content:center; padding:14px;">
          <span></span> Nouveau Client
        </a>
        <a th:href="@{/demandes/nouvelle}" class="btn btn-secondary" style="justify-content:center; padding:14px;">
          <span></span> Nouvelle Demande
        </a>
        <a th:href="@{/devis/nouveau}" class="btn btn-secondary" style="justify-content:center; padding:14px;">
          <span></span> Nouvelle devis
        </a>
        <div class="divider" style="margin:4px 0;"></div>
        <a th:href="@{/clients}" class="btn btn-secondary" style="justify-content:center; padding:14px;">
          <span></span> Voir tous les clients
        </a>
        <a th:href="@{/demandes}" class="btn btn-secondary" style="justify-content:center; padding:14px;">
          <span></span> Voir toutes les demandes
        </a>
         <a th:href="@{/devis}" class="btn btn-secondary" style="justify-content:center; padding:14px;">
          <span></span> Voir tous les devis
        </a>
      </div>
    </div>

  </div>

</th:block>
</body>
</html>
