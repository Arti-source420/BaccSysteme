<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content, activeMenu)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — Forage App'">Forage App</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" th:href="@{/}">
      <div class="sidebar-brand-icon"></div>
      <div>
        <span class="sidebar-brand-name">Forage App</span>
        <span class="sidebar-brand-sub">Gestion</span>
      </div>
    </a>
    <nav class="sidebar-nav">
      <span class="sidebar-label">Navigation</span>
      <a th:href="@{/}" class="sidebar-link"
         th:classappend="${activeMenu == 'home'} ? ' active' : ''">
        <span class="sidebar-link-icon"></span> Tableau de bord
      </a>
      <span class="sidebar-label">Gestion</span>
      <a th:href="@{/clients}" class="sidebar-link"
         th:classappend="${activeMenu == 'clients'} ? ' active' : ''">
        <span class="sidebar-link-icon"></span> Clients
      </a>
      <a th:href="@{/demandes}" class="sidebar-link"
         th:classappend="${activeMenu == 'demandes'} ? ' active' : ''">
        <span class="sidebar-link-icon"></span> Demandes
      </a>
      <a th:href="@{/devis}" class="sidebar-link"
         th:classappend="${activeMenu == 'devis'} ? ' active' : ''">
        <span class="sidebar-link-icon"></span> devis
      </a>
    </nav>
    <div class="sidebar-footer">© 2024 Forage App</div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <span class="topbar-title" th:text="${title}">Page</span>
      <div class="topbar-chip">
        <span>⛏️</span>
        <span>Forage Management</span>
      </div>
    </header>
    <main class="page-content">
      <th:block th:replace="${content}"/>
    </main>
  </div>
</div>

<!-- Modal suppression -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <span class="modal-icon">⚠️</span>
    <h3 class="modal-title">Confirmer la suppression</h3>
    <p class="modal-text" id="deleteModalText">Êtes-vous sûr de vouloir supprimer cet élément ?</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Annuler</button>
      <form id="deleteForm" method="post">
        <button type="submit" class="btn btn-danger">🗑 Supprimer</button>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
