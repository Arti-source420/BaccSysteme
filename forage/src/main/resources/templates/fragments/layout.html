<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content, activeMenu)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — Forage App'">Forage App</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>"/>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <a class="brand-logo" th:href="@{/}">
        <div class="brand-icon"></div>
        <div class="brand-text">
          <span class="brand-name">Forage</span>
          <span class="brand-sub">Gestion</span>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Navigation</span>

      <a th:href="@{/}" class="nav-link"
         th:classappend="${activeMenu == 'home'} ? ' active' : ''">
        <span class="nav-icon"></span>
        Tableau de bord
      </a>

      <span class="nav-section-label">Gestion</span>

      <a th:href="@{/clients}" class="nav-link"
         th:classappend="${activeMenu == 'clients'} ? ' active' : ''">
        <span class="nav-icon"></span>
        Clients
      </a>

      <a th:href="@{/demandes}" class="nav-link"
         th:classappend="${activeMenu == 'demandes'} ? ' active' : ''">
        <span class="nav-icon"></span>
        Demandes
      </a>
    </nav>

    <div class="sidebar-footer">
      <p class="sidebar-footer-text">© 2024 Forage App</p>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">
      <span class="topbar-title" th:text="${title}">Page</span>
      <div class="topbar-actions">
        <div class="topbar-badge">
          <span></span>
          <span>Forage Management</span>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content">
      <th:block th:replace="${content}"/>
    </main>
  </div>

</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-icon"></div>
    <h3 class="modal-title">Confirmer la suppression</h3>
    <p class="modal-text" id="deleteModalText">Êtes-vous sûr de vouloir supprimer cet élément ? Cette action est irréversible.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Annuler</button>
      <form id="deleteForm" method="post">
        <input type="hidden" name="_method" value="delete"/>
        <button type="submit" class="btn btn-danger">Supprimer</button>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
